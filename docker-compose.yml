services:
  mongo:
    image: mongo:7.0
    container_name: nakalchi-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: nakalchi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Phase 4: no Dockerfile yet (that's docker-compose.prod.yml's job, per
  # ARCHITECTURE.md §4's file tree) - plain node:24 image, repo
  # bind-mounted, dependencies installed into a container-local named
  # volume (NOT shared between api/worker - each gets its own, so their
  # independent `npm ci` runs can't race each other or the host's own
  # node_modules) so `docker compose up` alone satisfies this phase's
  # "one command" acceptance criterion.
  api:
    image: node:24
    container_name: nakalchi-api
    working_dir: /app
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
    # Phase 6 (BUGLOG.md, 2026-07-13 Phase 5 entry): api/worker had no
    # @nakalchi/core build step, so a fresh clone couldn't resolve the
    # package (dist/ is gitignored, no prepare/postinstall script exists).
    # Mirrors the fix web's command already applied to itself.
    command: sh -c "npm ci && npm run build --workspace=@nakalchi/core && npx tsx packages/service/src/server.ts"
    environment:
      MONGO_URI: mongodb://mongo:27017/Nakalchi
      REDIS_URL: redis://redis:6379
      API_KEYS: ${API_KEYS:-dev-local-api-key}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-local-webhook-secret-change-me}
      QUEUE_PREFIX: "Nakalchi:"
      PORT: "3000"
      # Phase 6: only the worker actually calls out to CodeArena (pull-mode
      # fetch happens worker-side, see queue/analysisWorker.ts) - loaded here
      # too since the shared zod env schema requires both vars regardless.
      CODEARENA_BASE_URL: ${CODEARENA_BASE_URL:-http://host.docker.internal:4000}
      CODEARENA_SERVICE_TOKEN: ${CODEARENA_SERVICE_TOKEN:-dev-local-service-token}
    # Docker Desktop (Mac/Windows) resolves host.docker.internal by default.
    # On plain Linux Docker Engine this needs extra_hosts below (uncomment):
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: node:24
    container_name: nakalchi-worker
    working_dir: /app
    volumes:
      - ./:/app
      - worker_node_modules:/app/node_modules
    # Phase 6: same core-build fix as api above.
    command: sh -c "npm ci && npm run build --workspace=@nakalchi/core && npx tsx packages/service/src/queue/analysisWorker.ts"
    environment:
      MONGO_URI: mongodb://mongo:27017/Nakalchi
      REDIS_URL: redis://redis:6379
      API_KEYS: ${API_KEYS:-dev-local-api-key}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-dev-local-webhook-secret-change-me}
      QUEUE_PREFIX: "Nakalchi:"
      WORKER_CONCURRENCY: "1"
      # Phase 6: pull-mode fetch (integrations/codearena.ts) runs here, at
      # the start of the `running` stage - see queue/analysisWorker.ts.
      CODEARENA_BASE_URL: ${CODEARENA_BASE_URL:-http://host.docker.internal:4000}
      CODEARENA_SERVICE_TOKEN: ${CODEARENA_SERVICE_TOKEN:-dev-local-service-token}
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Phase 5. Same bind-mount pattern as api/worker, but the command also
  # builds @nakalchi/core before starting Next - core's package.json
  # resolves "main"/"exports" to ./dist/index.js, dist/ is gitignored, and
  # there's no prepare/postinstall script anywhere in the repo, so a
  # fresh clone has no dist/ for anyone to import. api/worker have this
  # same latent gap (see BUGLOG.md, 2026-07-13 Phase 5) but are frozen -
  # not touched here. transpilePackages was considered instead but doesn't
  # actually help: it only changes whether Next transforms an already-
  # resolved file, not which file gets resolved, and module resolution
  # still follows core's exports to dist/index.js first regardless.
  web:
    image: node:24
    container_name: nakalchi-web
    working_dir: /app
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    # npm ci and the core build must run from /app (the workspace root -
    # npm workspaces symlinks and --workspace flags only resolve from
    # there), but `next dev` must run from packages/web itself, or Next
    # looks for src/app at the repo root and fails with "Couldn't find
    # any `pages` or `app` directory" (hit this for real - see BUGLOG.md).
    command: sh -c "npm ci && npm run build --workspace=@nakalchi/core && cd packages/web && npx next dev -p 3000 -H 0.0.0.0"
    environment:
      NAKALCHI_API_BASE_URL: http://api:3000
      NAKALCHI_API_KEY: ${API_KEYS:-dev-local-api-key}
    ports:
      - "3001:3000"
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
  api_node_modules:
  worker_node_modules:
  web_node_modules:
